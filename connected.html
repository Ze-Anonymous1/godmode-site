<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connected — GOD MODE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#0a0806;--gold:#c9a24b;--gold-soft:#e7cd8b;--gold-bright:#f4dfa2;--bronze:#8a6d2e;--ivory:#ece4d3;--muted:#9c907a;--faint:#6f6552;--line:rgba(201,162,75,.22);--display:"Cinzel",Georgia,serif;--sans:"Hanken Grotesk",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;--green:#6fe0a0}
  *{box-sizing:border-box;margin:0;padding:0}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='linear' slope='0.9'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:170px 170px;opacity:.34;mix-blend-mode:screen}
  body{font-family:var(--sans);color:var(--ivory);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;
    background:radial-gradient(ellipse 100% 80% at 50% 30%,#15120c 0%,#0c0a07 48%,#050403 100%) fixed;-webkit-font-smoothing:antialiased}
  .card{position:relative;z-index:1;width:100%;max-width:520px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(28,22,13,.72),rgba(10,8,6,.72));
    padding:44px 36px;text-align:center;box-shadow:0 40px 100px -30px rgba(0,0,0,.85)}
  .crest{height:80px;margin:0 auto 16px;display:block;filter:drop-shadow(0 8px 26px rgba(0,0,0,.55))}
  .brand{font-family:var(--display);font-weight:700;letter-spacing:.18em;font-size:.95rem;color:var(--ivory);text-transform:uppercase;margin-bottom:26px}
  .check{width:74px;height:74px;border-radius:50%;margin:0 auto 20px;display:grid;place-items:center;border:2px solid var(--green);color:var(--green);font-size:2.2rem;box-shadow:0 0 40px rgba(111,224,160,.25)}
  .spin{width:54px;height:54px;border-radius:50%;margin:6px auto 22px;border:3px solid rgba(201,162,75,.25);border-top-color:var(--gold-bright);animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  h1{font-family:var(--display);font-weight:600;font-size:1.7rem;margin-bottom:8px}
  .gold-text{background:linear-gradient(96deg,var(--gold-bright),var(--gold-soft) 42%,var(--bronze));-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);font-size:1rem;line-height:1.6}
  .email{font-family:var(--mono);color:var(--gold-soft);font-size:.92rem;margin-top:6px;word-break:break-all}
  .err{color:#e79a9a}
  .home{display:inline-block;margin-top:26px;font-family:var(--display);font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:.72rem;color:var(--gold-bright);text-decoration:none;border:1px solid rgba(201,162,75,.5);border-radius:8px;padding:11px 22px}
  .home:hover{background:var(--gold-bright);color:#15110a}
</style>
</head>
<body>
  <div class="card">
    <img class="crest" src="assets/img/crest.png" alt="GOD MODE" />
    <div class="brand">GOD&nbsp;MODE</div>
    <div id="state">
      <div class="spin"></div>
      <h1>Connecting…</h1>
      <p>Securing your account with GOD MODE.</p>
    </div>
    <a class="home" href="/">Back to GOD MODE</a>
  </div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const SUPABASE_URL = 'https://ynqnfuyzeflhlscuzfmp.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlucW5mdXl6ZWZsaGxzY3V6Zm1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI4NjAyOTAsImV4cCI6MjA3ODQzNjI5MH0.0rTJtNh83DpzAIdVWv93WE4kTyG78dNS-sQfVZ7cN-s';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { detectSessionInUrl: true, flowType: 'implicit' } });
  const el = document.getElementById('state');
  const ok = (email) => { el.innerHTML = `<div class="check">✓</div><h1>You're <span class="gold-text">connected</span></h1><p>GOD MODE is now linked to your Google account.</p><p class="email">${email||''}</p>`; };
  const fail = (m) => { el.innerHTML = `<div class="check err" style="border-color:#e79a9a;color:#e79a9a">!</div><h1>Couldn't connect</h1><p class="err">${m}</p>`; };
  try {
    // give supabase a moment to parse the URL session
    await new Promise(r=>setTimeout(r,600));
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error) throw error;
    if (!session) { fail('No session was returned. Please try connecting again.'); }
    else {
      const email = session.user?.email;
      // persist the Google tokens (best-effort; RLS scopes to this user)
      try {
        await supabase.from('godmode_google_tokens').insert({
          user_id: session.user.id,
          email,
          provider_token: session.provider_token || null,
          provider_refresh_token: session.provider_refresh_token || null,
          scopes: 'gmail.modify gmail.send calendar.readonly'
        });
      } catch(e) { /* non-fatal */ }
      ok(email);
    }
  } catch (e) { fail(e.message || String(e)); }
</script>
</body>
</html>
