<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GOD MODE</title>
<style>
  :root{
    --ink:#0a0806; --panel:#100c07; --panel-2:#15110b;
    --gold:#c9a24b; --gold-soft:#e7cd8b; --gold-bright:#f4dfa2; --bronze:#8a6d2e;
    --ivory:#ece4d3; --muted:#9c907a; --faint:#6f6552;
    --line:rgba(201,162,75,.20); --line-2:rgba(201,162,75,.42);
    --display:"Cinzel",Georgia,serif; --serif:"Cormorant Garamond",Georgia,serif;
    --sans:"Hanken Grotesk",system-ui,-apple-system,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:transparent;color:var(--ivory);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none}

  /* ── Top control / address bar ─────────────────────────────── */
  .topbar{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;gap:12px;
    padding:0 16px 0 90px;-webkit-app-region:drag;
    background:linear-gradient(180deg,#12100a,#0b0805);border-bottom:1px solid var(--line)}
  .topbar .brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:700;
    letter-spacing:.16em;font-size:.9rem;text-transform:uppercase;color:var(--gold-bright);-webkit-app-region:no-drag}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold-bright),var(--bronze));box-shadow:0 0 12px var(--gold)}
  .navbtns{display:flex;gap:4px;-webkit-app-region:no-drag}
  .navbtns button{width:34px;height:34px;border:1px solid var(--line);background:rgba(201,162,75,.05);color:var(--gold-soft);
    border-radius:8px;cursor:pointer;font-size:1rem;line-height:1;transition:.15s}
  .navbtns button:hover:not(:disabled){border-color:var(--line-2);background:rgba(201,162,75,.12)}
  .navbtns button:disabled{opacity:.3;cursor:default}
  .omni{flex:1;display:flex;align-items:center;gap:10px;height:38px;padding:0 14px;-webkit-app-region:no-drag;
    background:rgba(5,4,3,.6);border:1px solid var(--line);border-radius:10px}
  .omni:focus-within{border-color:var(--line-2);box-shadow:0 0 0 3px rgba(201,162,75,.08)}
  .omni .lock{color:var(--gold-soft);flex:none;display:flex}
  .omni input{flex:1;background:none;border:0;outline:0;color:var(--ivory);font-family:var(--mono);font-size:.82rem;letter-spacing:.01em}
  .omni input::placeholder{color:var(--faint)}

  /* ── Right AI + voice panel ────────────────────────────────── */
  .panel{position:fixed;top:64px;right:0;bottom:0;width:372px;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#0e0b07,#080604);border-left:1px solid var(--line)}
  .panel-head{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .panel-head .k{font-family:var(--mono);font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold)}
  .panel-head h1{font-family:var(--serif);font-weight:600;font-size:1.5rem;color:var(--gold-bright);margin-top:3px;letter-spacing:.01em}

  /* voice orb */
  .voice{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 0 20px;border-bottom:1px solid var(--line)}
  .orb{position:relative;width:96px;height:96px;border-radius:50%;cursor:pointer;-webkit-app-region:no-drag;
    background:radial-gradient(circle at 38% 32%,rgba(244,223,162,.35),rgba(138,109,46,.12) 60%,transparent 72%);
    border:1px solid var(--line-2);display:grid;place-items:center;transition:.2s}
  .orb::before,.orb::after{content:"";position:absolute;inset:0;border-radius:50%;border:1px solid rgba(201,162,75,.4)}
  .orb.live::before{animation:ring 2.4s ease-out infinite}
  .orb.live::after{animation:ring 2.4s ease-out infinite 1.2s}
  @keyframes ring{0%{transform:scale(.6);opacity:.8}100%{transform:scale(1.5);opacity:0}}
  .orb svg{width:34px;height:34px;color:var(--gold-bright);z-index:1}
  .orb:hover{border-color:var(--gold);box-shadow:0 0 30px rgba(201,162,75,.3)}
  .voice .status{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .voice .status.on{color:#6fe0a0}
  .voice .status.off{color:var(--bronze)}

  /* transcript */
  .thread{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
  .thread::-webkit-scrollbar{width:8px}.thread::-webkit-scrollbar-thumb{background:rgba(201,162,75,.2);border-radius:4px}
  .msg{max-width:100%;font-size:.86rem;line-height:1.5}
  .msg .who{font-family:var(--mono);font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px}
  .msg.user .who{color:var(--muted)} .msg.ai .who{color:var(--gold)}
  .msg .bubble{padding:10px 13px;border-radius:11px;border:1px solid var(--line)}
  .msg.user .bubble{background:rgba(201,162,75,.05);color:#d8cdb4}
  .msg.ai .bubble{background:rgba(201,162,75,.08);border-color:var(--line-2);color:var(--ivory)}
  .msg.tool{font-family:var(--mono);font-size:.66rem;color:var(--gold-soft)}
  .msg.tool .bubble{background:rgba(5,4,3,.6);border-style:dashed;color:var(--gold-soft);display:flex;gap:8px;align-items:center}
  .msg.tool .bubble b{color:var(--gold-bright);font-weight:500}
  .empty{margin:auto;text-align:center;color:var(--faint);font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;line-height:1.8;padding:20px}

  /* composer */
  .composer{padding:12px;border-top:1px solid var(--line);display:flex;gap:8px}
  .composer input{flex:1;background:rgba(5,4,3,.6);border:1px solid var(--line);border-radius:10px;padding:11px 13px;
    color:var(--ivory);font-family:var(--sans);font-size:.86rem;outline:0}
  .composer input:focus{border-color:var(--line-2)}
  .composer button{width:44px;border:1px solid var(--line-2);border-radius:10px;background:linear-gradient(180deg,rgba(201,162,75,.2),rgba(201,162,75,.06));
    color:var(--gold-bright);cursor:pointer;font-size:1.1rem;transition:.15s}
  .composer button:hover{background:linear-gradient(180deg,#f6da82,#d8b257);color:#15110a}

  .start-scrim{position:fixed;inset:64px 372px 0 0;display:grid;place-items:center;pointer-events:none;
    background:radial-gradient(ellipse 70% 60% at 50% 42%,rgba(201,162,75,.06),transparent 70%)}
  .start-scrim .wm{font-family:var(--display);font-weight:700;letter-spacing:.24em;font-size:2.6rem;color:rgba(201,162,75,.14);text-transform:uppercase}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span>GOD&nbsp;MODE</div>
    <div class="navbtns">
      <button id="back" title="Back" disabled>‹</button>
      <button id="fwd" title="Forward" disabled>›</button>
      <button id="reload" title="Reload">⟳</button>
    </div>
    <div class="omni">
      <span class="lock"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></span>
      <input id="url" placeholder="Search, enter a URL, or ask GOD MODE…" spellcheck="false" />
    </div>
  </div>

  <div class="start-scrim"><div class="wm">GOD MODE</div></div>

  <aside class="panel">
    <div class="panel-head">
      <div class="k">AI Browser · Live</div>
      <h1>Talk to GOD&nbsp;MODE</h1>
    </div>

    <div class="voice">
      <div class="orb" id="orb" title="Hold a conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg>
      </div>
      <div class="status off" id="vstatus">Voice offline</div>
    </div>

    <div class="thread" id="thread">
      <div class="empty" id="empty">Ask me to find someone,<br>open a site, or run a trace.<br><br>I'll drive the browser for you.</div>
    </div>

    <div class="composer">
      <input id="ask" placeholder="Ask GOD MODE anything…" />
      <button id="send" title="Send">↑</button>
    </div>
  </aside>

  <script src="./renderer.js"></script>
</body>
</html>
